name: Feature request
description: Suggest a widget or an improvement to one
labels: [enhancement]
body:
  - type: textarea
    id: idea
    attributes:
      label: The idea
      description: What it does and why it's useful. A concrete use case helps.
    validations:
      required: true
  - type: textarea
    id: data
    attributes:
      label: Where the data comes from
      description: >
        Most widgets read a command, an HTTP endpoint, or a Home Assistant entity. If you know the
        source, say so — it's usually the hard part.
